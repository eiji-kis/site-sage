services:
  postgres:
    image: postgres:16-alpine
    container_name: site-sage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: site_sage
    ports:
      - "${POSTGRES_PORT:-55431}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d site_sage"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
